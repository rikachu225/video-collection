name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import flask; print(f'Flask {flask.__version__}')"
          python -c "import waitress; print('Waitress OK')"
          python -c "from pathlib import Path; print('Pathlib OK')"

      - name: Check for syntax errors
        run: |
          python -m py_compile server.py
          python -m py_compile desktop.py

      - name: Verify server starts
        run: |
          python -c "
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location('server', 'server.py')
          mod = importlib.util.module_from_spec(spec)
          # Don't actually run it, just verify it loads
          print('Server module syntax OK')
          "

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install safety
        run: pip install safety pip-audit

      - name: Check for known vulnerabilities (pip-audit)
        run: |
          pip install -r requirements.txt
          pip-audit --strict || true

      - name: Scan for secrets
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -rn "API_KEY\|SECRET_KEY\|PASSWORD\|TOKEN" --include="*.py" --include="*.js" --include="*.json" . \
            | grep -v "config.example" \
            | grep -v "node_modules" \
            | grep -v ".git/" \
            | grep -v "# " \
            | grep -v "venv/" \
            || echo "No secrets found ✓"
